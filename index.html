<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-commerce Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Boldonse&display=swap');
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!-- NAVBAR _____________________________ -->
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg mynav navbar-light p-2 fixed-top">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1 fs-3 brand brandName">Clone<span class="web">Website</span>
                </span>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <i class="fa-solid icon fa-cart-arrow-down"></i>
            </div>
        </nav>
    </div>

    <div class="sidebar m-3 p-4"
        style="background-color: #525081; height: 100vh; width: 22%; position: fixed; top: 70px; left: 0; z-index: 1;">
        <form class="">
            <select class="form-select mt-2 d-flex" id="category">
                <option value="">All Categories</option>
                <option value="clothes">Clothes</option>
                <option value="beauty">Beauty</option>
                <option value="footwear">Footwear</option>
                <option value="accessories">Accessories</option>
            </select>

            <select class="form-select mt-2" id="gender">
                <option value="">All</option>
                <option value="Men">Men</option>
                <option value="Women">Women</option>
            </select>

            <select class="form-select mt-2" id="type">
                <option value="">All</option>
                <option value="T-Shirts">T-Shirts</option>
                <option value="Pants">Pants</option>
            </select>
        </form>
        <button onclick="applyFilters()" class="btn btn-dark text-light mt-3 w-100">
            Apply Filters
        </button>
    </div>
    <!-- _____________________________CARROUSEL______________________________ -->
    <div class="mainpart mt-0 w-75" style="margin-left:24%;">
        <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item img1 active">
                    <img src="https://us.christianlouboutin.com/media/wysiwyg/landing-pages/FANNY-COVER-WITH-TITLE-PUSH-DESKTOP.jpg"
                        class="d-block w-100 mx-auto" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="https://assets.unileversolutions.com/v1/124548098.png"
                        class="d-block w-100 mx-auto" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="https://www.mariab.pk/cdn/shop/files/Chiffon_Pre-hype_web_banner_2880X1620_1e315b9b-41dd-497f-805b-0dc9a4aada3f.jpg?v=1775802691&width=1500" class="d-block w-100 mx-auto"
                        alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
        <!-- _________________________ALL PRODUCTS_______________________________ -->
        <div class="container myproducts">
            <div class="allProducts">
                <div class="row row-cols-1 row-cols-md-3 g-4" id="allProducts">

                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="app.js"></script>
</body>

</html>
